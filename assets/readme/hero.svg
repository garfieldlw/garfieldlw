<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" width="100%">
  <title>garfieldlw - Architect specializing in AI applications, IM systems, and distributed infrastructure</title>
  <desc>A GitHub profile hero showing terminal commands and developer skills</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="450" fill="url(#bg)" rx="8"/>
  
  <!-- Grid pattern -->
  <g opacity="0.04">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#58a6ff" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="450" fill="url(#grid)"/>
  </g>
  
  <!-- Center content group -->
  <g transform="translate(600, 50)">
    <!-- Terminal (centered) -->
    <g transform="translate(-200, 0)">
      <rect x="0" y="0" width="400" height="160" fill="#0d1117" stroke="#30363d" stroke-width="1" rx="6"/>
      <rect x="0" y="0" width="400" height="26" fill="#161b22" rx="6"/>
      <circle cx="14" cy="13" r="4" fill="#ff5f57"/>
      <circle cx="28" cy="13" r="4" fill="#febc2e"/>
      <circle cx="42" cy="13" r="4" fill="#28c840"/>
      <text x="60" y="17" font-family="monospace" font-size="10" fill="#8b949e">garfieldlw@dev ~</text>
      <text x="14" y="52" font-family="monospace" font-size="12" fill="#7ee787">$</text>
      <text x="30" y="52" font-family="monospace" font-size="12" fill="#c9d1d9">go build ./...</text>
      <text x="14" y="76" font-family="monospace" font-size="12" fill="#7ee787">$</text>
      <text x="30" y="76" font-family="monospace" font-size="12" fill="#c9d1d9">docker compose up -d</text>
      <text x="14" y="100" font-family="monospace" font-size="12" fill="#7ee787">$</text>
      <text x="30" y="100" font-family="monospace" font-size="12" fill="#c9d1d9">kubectl apply -f deploy.yaml</text>
      <text x="14" y="124" font-family="monospace" font-size="12" fill="#7ee787">$</text>
      <text x="30" y="124" font-family="monospace" font-size="12" fill="#c9d1d9">ollama run llama3</text>
      <rect x="30" y="132" width="7" height="12" fill="#58a6ff" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0;0.8" dur="2.5s" repeatCount="indefinite"/>
      </rect>
    </g>
    
    <!-- Name (centered below terminal) -->
    <text x="0" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#f0f6fc" text-anchor="middle">garfieldlw</text>
    
    <!-- Tagline -->
    <text x="0" y="245" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">Code magician &amp; bug maker</text>
    
    <!-- Role -->
    <text x="0" y="275" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#58a6ff" text-anchor="middle">Architect · Backend · AI · IM · Cloud Native</text>
    
    <!-- Skills row (centered) -->
    <g transform="translate(-325, 300)">
      <!-- AI/ML - Brain icon -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="100" height="40" fill="#21262d" rx="6"/>
        <circle cx="50" cy="16" r="10" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
        <path d="M45 16 L55 16 M50 11 L50 21 M46 13 L54 19 M54 13 L46 19" stroke="#58a6ff" stroke-width="1" fill="none"/>
        <text x="50" y="34" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">AI / ML</text>
      </g>
      
      <!-- IM Systems - Chat bubble icon -->
      <g transform="translate(110, 0)">
        <rect x="0" y="0" width="100" height="40" fill="#21262d" rx="6"/>
        <path d="M35 10 L65 10 L65 22 L55 22 L50 27 L50 22 L35 22 Z" fill="none" stroke="#7ee787" stroke-width="1.5" stroke-linejoin="round"/>
        <circle cx="43" cy="16" r="2" fill="#7ee787"/>
        <circle cx="50" cy="16" r="2" fill="#7ee787"/>
        <circle cx="57" cy="16" r="2" fill="#7ee787"/>
        <text x="50" y="34" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">IM Systems</text>
      </g>
      
      <!-- Distributed - Network nodes icon -->
      <g transform="translate(220, 0)">
        <rect x="0" y="0" width="100" height="40" fill="#21262d" rx="6"/>
        <circle cx="50" cy="12" r="4" fill="#bc8cff"/>
        <circle cx="38" cy="22" r="4" fill="#bc8cff"/>
        <circle cx="62" cy="22" r="4" fill="#bc8cff"/>
        <line x1="50" y1="12" x2="38" y2="22" stroke="#bc8cff" stroke-width="1"/>
        <line x1="50" y1="12" x2="62" y2="22" stroke="#bc8cff" stroke-width="1"/>
        <line x1="38" y1="22" x2="62" y2="22" stroke="#bc8cff" stroke-width="1"/>
        <text x="50" y="34" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Distributed</text>
      </g>
      
      <!-- Go - Go gopher style -->
      <g transform="translate(330, 0)">
        <rect x="0" y="0" width="100" height="40" fill="#21262d" rx="6"/>
        <circle cx="50" cy="16" r="12" fill="#00ADD8" opacity="0.2"/>
        <circle cx="50" cy="16" r="12" fill="none" stroke="#00ADD8" stroke-width="1.5"/>
        <text x="50" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#00ADD8" text-anchor="middle">Go</text>
      </g>
      
      <!-- K8s - Wheel icon -->
      <g transform="translate(430, 0)">
        <rect x="0" y="0" width="100" height="40" fill="#21262d" rx="6"/>
        <circle cx="50" cy="14" r="10" fill="none" stroke="#326ce5" stroke-width="1.5"/>
        <circle cx="50" cy="14" r="4" fill="#326ce5"/>
        <line x1="50" y1="4" x2="50" y2="8" stroke="#326ce5" stroke-width="1.5"/>
        <line x1="50" y1="20" x2="50" y2="24" stroke="#326ce5" stroke-width="1.5"/>
        <line x1="40" y1="14" x2="44" y2="14" stroke="#326ce5" stroke-width="1.5"/>
        <line x1="56" y1="14" x2="60" y2="14" stroke="#326ce5" stroke-width="1.5"/>
        <text x="50" y="34" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">K8s</text>
      </g>
      
      <!-- Docker - Container icon -->
      <g transform="translate(540, 0)">
        <rect x="0" y="0" width="100" height="40" fill="#21262d" rx="6"/>
        <rect x="38" y="10" width="24" height="14" fill="none" stroke="#2496ed" stroke-width="1.5" rx="2"/>
        <line x1="38" y1="14" x2="62" y2="14" stroke="#2496ed" stroke-width="1"/>
        <line x1="38" y1="18" x2="62" y2="18" stroke="#2496ed" stroke-width="1"/>
        <line x1="38" y1="22" x2="62" y2="22" stroke="#2496ed" stroke-width="1"/>
        <rect x="44" y="6" width="12" height="4" fill="#2496ed" rx="1"/>
        <text x="50" y="34" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Docker</text>
      </g>
    </g>
  </g>
  
  <!-- Location (bottom left) -->
  <g transform="translate(60, 400)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#8b949e">📍 Hangzhou, China</text>
  </g>
</svg>